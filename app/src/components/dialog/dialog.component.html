<hlm-dialog-content [style.width]="context.width ? context.width : '33vw'"
  [style.max-width]="context.width ? context.width : '33vw'">
  <hlm-dialog-header>
    <h3 hlmDialogTitle>{{ context.title }}</h3>
    <p hlmDialogDescription>{{ context.description }}</p>
  </hlm-dialog-header>

  @if (context.component) {
  <div class="flex-1 overflow-y-auto p-4">
    <ng-container [ngComponentOutlet]="context.component.outlet" [ngComponentOutletInputs]="context.component.props" />
  </div>
  }

  @if (actions.length > 0) {
  <hlm-dialog-footer class="flex flex-row justify-end">
    @for (action of actions; track action.label) {
    <button hlmBtn [variant]="action.variant ?? 'default'" [disabled]="isDisabled(action)"
      (click)="onActionClick(action)">
      {{ action.label }}
    </button>
    }
  </hlm-dialog-footer>
  }
</hlm-dialog-content>
