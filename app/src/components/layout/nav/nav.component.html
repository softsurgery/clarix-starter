<hlm-sidebar-group>
  <ul hlmSidebarMenu>
    @for (item of items(); track $index) {
    <hlm-collapsible routerLinkActive="active" #rlaGroup="routerLinkActive" [expanded]="(item.isActive ?? false) || rlaGroup.isActive">
      <li hlmSidebarMenuItem>
        @if (item.items; as subItems) {
        <button hlmSidebarMenuButton hlmCollapsibleTrigger class="group w-full">
          <ng-icon [name]="item.icon" />
          <span class="flex-1 text-left">{{ item.title }}</span>
          <ng-icon name="lucideChevronRight" class="transition-transform duration-200 group-data-[state=open]:rotate-90" />
        </button>
        <hlm-collapsible-content>
          <ul hlmSidebarMenuSub>
            @for (subItem of subItems; track $index) {
            <li hlmSidebarMenuSubItem>
              <a hlmSidebarMenuSubButton [routerLink]="subItem.url" routerLinkActive #rlaSub="routerLinkActive" [isActive]="rlaSub.isActive">
                @if (subItem.icon) {
                <ng-icon [name]="subItem.icon" />
                }
                <span>{{ subItem.title }}</span>
              </a>
            </li>
            }
          </ul>
        </hlm-collapsible-content>
        } @else {
        <a hlmSidebarMenuButton [routerLink]="item.url" routerLinkActive #rla="routerLinkActive" [isActive]="rla.isActive">
          <ng-icon [name]="item.icon" />
          <span>{{ item.title }}</span>
        </a>
        }
      </li>
    </hlm-collapsible>
    }
  </ul>
</hlm-sidebar-group>
