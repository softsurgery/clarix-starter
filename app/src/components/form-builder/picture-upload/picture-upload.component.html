<div class="flex flex-col gap-2">
  <div
    class="relative flex items-center justify-center w-full h-40 border-2 border-dashed rounded-lg cursor-pointer hover:border-border transition-colors"
    [class.border-muted-foreground]="!previewUrl"
    [class.border-primary]="previewUrl"
    (click)="fileInput.click()"
    (dragover)="onDragOver($event)"
    (drop)="onDrop($event)"
  >
    <input
      #fileInput
      type="file"
      accept="image/*"
      class="hidden"
      (change)="onFileSelected($event)"
    />

    @if (previewUrl | async) {
      <ng-container>
        <img
          [src]="previewUrl | async"
          alt="Preview"
          class="max-h-36 max-w-full object-contain rounded"
        />
        <button
          type="button"
          class="absolute top-1 right-1 bg-destructive text-destructive-foreground rounded-full w-6 h-6 flex items-center justify-center text-xs hover:opacity-80"
          (click)="removePicture($event)"
        >
          ✕
        </button>
      </ng-container>
    } @else {
      <ng-template #placeholder>
        <div class="flex flex-col items-center gap-1 text-muted-foreground">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          <span class="text-sm">Click or drag an image to upload</span>
        </div>
      </ng-template>
    }
  </div>

  @if (uploading | async) {
    <app-spinner />
  }
</div>
