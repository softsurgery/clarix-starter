<div class="min-h-screen flex items-center justify-center p-4 bg-background">
  <div class="w-full max-w-md rounded-2xl border shadow-2xl p-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto mb-4 flex items-center justify-center rounded-full">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-primary" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5.121 17.804A9 9 0 1118.88 6.196M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>

      <h2 class="text-3xl font-bold">Welcome Back</h2>
      <p class="text-muted-foreground mt-2">Sign in to access your account</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onLogin()" class="space-y-5">
      <!-- Username -->
      <div class="space-y-2">
        <label hlmLabel>Username</label>
        <input hlmInput [(ngModel)]="username" name="username" type="text" placeholder="Enter username"
          class="w-full h-11" />
      </div>

      <!-- Password -->
      <div class="space-y-2">
        <label hlmLabel>Password</label>
        <input hlmInput [(ngModel)]="password" name="password" type="password" placeholder="Enter password"
          class="w-full h-11" />
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600">
        {{ errorMessage }}
      </div>

      <!-- Login Button -->
      <button hlmBtn type="submit" class="w-full h-11 rounded-lg text-base font-medium">
        Start Session
      </button>
    </form>

    <!-- Footer -->
    <div class="mt-6 text-center text-sm text-muted-foreground">© 2026 Your Company</div>
  </div>
</div>
