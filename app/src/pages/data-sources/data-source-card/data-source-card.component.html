<div
  class="group relative flex flex-col items-center rounded-xl border border-border bg-card p-6 shadow-sm transition hover:border-primary/30 hover:shadow-md"
>
  <!-- Actions -->
  <div class="absolute right-3 top-3 opacity-0 transition-opacity group-hover:opacity-100">
    <button hlmBtn variant="ghost" size="icon" class="h-8 w-8" [hlmDropdownMenuTrigger]="menu">
      <ng-icon name="lucideMoreVertical" hlmIcon />
    </button>
  </div>

  <ng-template #menu>
    <hlm-dropdown-menu class="w-48">
      <button hlmDropdownMenuItem (click)="edit.emit(ds())">
        <ng-icon name="lucidePencil" hlmIcon class="mr-2 h-4 w-4" />
        Edit
      </button>

      <button hlmDropdownMenuItem (click)="test.emit(ds())" [disabled]="isTesting()">
        <ng-icon name="lucideZap" hlmIcon class="mr-2 h-4 w-4" [class.animate-spin]="isTesting()" />
        Test
      </button>

      <hlm-dropdown-menu-separator />

      <button hlmDropdownMenuItem class="text-destructive" (click)="delete.emit(ds())">
        <ng-icon name="lucideTrash2" hlmIcon class="mr-2 h-4 w-4" />
        Delete
      </button>
    </hlm-dropdown-menu>
  </ng-template>

  <!-- Logo -->
  @if (ds().type === 'postgresql') {
    <img src="assets/images/Postgresql_elephant.svg" class="h-14 w-14 object-contain" />
  }

  @if (ds().type === 'mysql') {
    <img src="assets/images/mysql.png" class="h-14 w-14 object-contain" />
  }

  @if (ds().type === 'mariadb') {
    <img src="assets/images/mariadb.png" class="h-14 w-14 object-contain" />
  }

  @if (ds().type === 'oracle') {
    <img src="assets/images/oracle.png" class="h-14 w-14 object-contain" />
  }

  <!-- Info -->
  <div class="mt-4 flex flex-col items-center text-center">
    <span
      class="rounded-full border border-border bg-background px-2 py-1 text-[10px] font-medium uppercase text-muted-foreground"
    >
      {{ getTypeLabel(ds().type) }}
    </span>

    <h3 class="mt-3 max-w-full truncate text-lg font-semibold">
      {{ ds().name }}
    </h3>

    <p class="font-mono text-sm text-muted-foreground">{{ ds().host }}:{{ ds().port }}</p>
  </div>

  <!-- Footer -->
  <div class="mt-6 flex w-full items-center justify-between border-t border-border pt-4 text-xs">
    <div class="flex items-center gap-2 text-muted-foreground">
      <span
        class="h-2 w-2 rounded-full"
        [class.bg-emerald-500]="ds().isActive"
        [class.bg-muted]="!ds().isActive"
      ></span>

      {{ ds().isActive ? 'Active' : 'Inactive' }}
    </div>

    <div class="flex items-center gap-1 text-muted-foreground">
      <ng-icon [name]="ds().ssl ? 'lucideShieldCheck' : 'lucideShieldOff'" hlmIcon size="xs" />
      {{ ds().ssl ? 'SSL' : 'No SSL' }}
    </div>
  </div>
</div>
